<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 900" font-family="Times New Roman, Times, Georgia, serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#444"/>
    </marker>
    <marker id="arrow-skip" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#B07040"/>
    </marker>
  </defs>

  <rect width="520" height="900" fill="white"/>

  <!-- ==================== OUTPUT (top) ==================== -->
  <rect x="195" y="20" width="130" height="45" rx="3" fill="#DCE8DC" stroke="#608060" stroke-width="1.2"/>
  <text x="260" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A5A3A">Clean Guitar</text>
  <text x="260" y="55" text-anchor="middle" font-size="10" fill="#608060" font-style="italic">Stereo (2, T)</text>

  <!-- Arrow: Head → Output -->
  <path d="M 260 85 C 260 78, 260 72, 260 65" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ==================== MIXING HEAD ==================== -->
  <rect x="160" y="85" width="200" height="155" rx="3" fill="#F0EBE0" stroke="#A08060" stroke-width="1.8"/>
  <text x="260" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#5A4030">Mixing Head</text>
  <text x="260" y="122" text-anchor="middle" font-size="9" fill="#A08060" font-style="italic">trainable</text>

  <rect x="180" y="133" width="160" height="18" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="0.8"/>
  <text x="260" y="146" text-anchor="middle" font-size="9" fill="#5A4030">Conv1d 32 → 2, k=3</text>

  <rect x="180" y="156" width="160" height="18" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="0.8"/>
  <text x="260" y="169" text-anchor="middle" font-size="9" fill="#5A4030">Conv1d 64 → 32, k=5 + GELU</text>

  <rect x="180" y="179" width="160" height="18" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="0.8"/>
  <text x="260" y="192" text-anchor="middle" font-size="9" fill="#5A4030">Conv1d 64 → 64, k=7 + GELU</text>

  <rect x="180" y="202" width="160" height="18" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="0.8"/>
  <text x="260" y="215" text-anchor="middle" font-size="9" fill="#5A4030">Conv1d 8 → 64, k=7 + GELU</text>

  <!-- Arrow: Reshape → Head -->
  <path d="M 260 260 C 260 252, 260 248, 260 240" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== RESHAPE ===== -->
  <rect x="210" y="260" width="100" height="40" rx="3" fill="#ECEEF2" stroke="#666" stroke-width="1.2"/>
  <text x="260" y="278" text-anchor="middle" font-size="10" font-weight="bold" fill="#444">Reshape</text>
  <text x="260" y="293" text-anchor="middle" font-size="9" fill="#777" font-style="italic">(B, 8, T)</text>

  <text x="260" y="318" text-anchor="middle" font-size="10" fill="#777" font-style="italic">4 sources × 2 channels</text>

  <!-- Arrows: Decoders → Reshape -->
  <path d="M 140 340 C 160 330, 210 315, 230 300" fill="none" stroke="#444" stroke-width="1.4"/>
  <path d="M 380 340 C 360 330, 310 315, 290 300" fill="none" stroke="#444" stroke-width="1.4"/>

  <!-- ==================== HDEMUCS BACKBONE ==================== -->
  <rect x="30" y="330" width="460" height="500" rx="4" fill="none" stroke="#7888A0" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="260" y="845" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A5568">HDemucs Backbone</text>

  <!-- ===== DECODER ROW ===== -->
  <!-- Freq Decoder -->
  <rect x="55" y="350" width="170" height="140" rx="3" fill="#DAE1EA" stroke="#7888A0" stroke-width="1.2"/>
  <text x="140" y="372" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B4A60">Frequency Decoder</text>
  <text x="140" y="388" text-anchor="middle" font-size="9" fill="#7888A0" font-style="italic">iSTFT domain</text>

  <rect x="70" y="400" width="140" height="20" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="1.2"/>
  <text x="140" y="414" text-anchor="middle" font-size="9" fill="#5A4030" font-weight="bold">Layers 3–5 (trainable)</text>
  <rect x="70" y="427" width="140" height="20" rx="2" fill="#EEF0F4" stroke="#7888A0" stroke-width="0.8"/>
  <text x="140" y="441" text-anchor="middle" font-size="9" fill="#666">Layers 0–2 (frozen)</text>

  <!-- Time Decoder -->
  <rect x="295" y="350" width="170" height="140" rx="3" fill="#DAE1EA" stroke="#7888A0" stroke-width="1.2"/>
  <text x="380" y="372" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B4A60">Temporal Decoder</text>
  <text x="380" y="388" text-anchor="middle" font-size="9" fill="#7888A0" font-style="italic">Transposed conv</text>

  <rect x="310" y="400" width="140" height="20" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="1.2"/>
  <text x="380" y="414" text-anchor="middle" font-size="9" fill="#5A4030" font-weight="bold">Layers 2–4 (trainable)</text>
  <rect x="310" y="427" width="140" height="20" rx="2" fill="#EEF0F4" stroke="#7888A0" stroke-width="0.8"/>
  <text x="380" y="441" text-anchor="middle" font-size="9" fill="#666">Layers 0–1 (frozen)</text>

  <!-- Arrows: Transformer → Decoders -->
  <path d="M 220 520 C 200 510, 160 500, 140 490" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M 300 520 C 320 510, 360 500, 380 490" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== CROSS-DOMAIN TRANSFORMER ===== -->
  <rect x="145" y="520" width="230" height="120" rx="3" fill="#E6E0EC" stroke="#8878A0" stroke-width="1.2"/>
  <text x="260" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#504068">Cross-Domain Transformer</text>
  <line x1="170" y1="555" x2="350" y2="555" stroke="#B0A8C0" stroke-width="0.5"/>
  <text x="210" y="575" text-anchor="middle" font-size="9" fill="#706080">Self-attention</text>
  <text x="210" y="589" text-anchor="middle" font-size="9" fill="#706080">within domain</text>
  <text x="320" y="575" text-anchor="middle" font-size="9" fill="#706080">Cross-attention</text>
  <text x="320" y="589" text-anchor="middle" font-size="9" fill="#706080">across domains</text>
  <line x1="170" y1="600" x2="350" y2="600" stroke="#B0A8C0" stroke-width="0.5"/>
  <text x="260" y="620" text-anchor="middle" font-size="9" fill="#999" font-style="italic">frozen</text>

  <!-- Arrows: Encoders → Transformer -->
  <path d="M 140 670 C 160 660, 200 650, 220 640" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M 380 670 C 360 660, 320 650, 300 640" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== ENCODER ROW ===== -->
  <!-- Freq Encoder -->
  <rect x="55" y="670" width="170" height="140" rx="3" fill="#DAE1EA" stroke="#7888A0" stroke-width="1.2"/>
  <text x="140" y="692" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B4A60">Frequency Encoder</text>
  <text x="140" y="708" text-anchor="middle" font-size="9" fill="#7888A0" font-style="italic">STFT domain</text>

  <rect x="70" y="720" width="140" height="20" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="1.2"/>
  <text x="140" y="734" text-anchor="middle" font-size="9" fill="#5A4030" font-weight="bold">Layers 3–5 (trainable)</text>
  <rect x="70" y="747" width="140" height="20" rx="2" fill="#EEF0F4" stroke="#7888A0" stroke-width="0.8"/>
  <text x="140" y="761" text-anchor="middle" font-size="9" fill="#666">Layers 0–2 (frozen)</text>

  <!-- Time Encoder -->
  <rect x="295" y="670" width="170" height="140" rx="3" fill="#DAE1EA" stroke="#7888A0" stroke-width="1.2"/>
  <text x="380" y="692" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B4A60">Temporal Encoder</text>
  <text x="380" y="708" text-anchor="middle" font-size="9" fill="#7888A0" font-style="italic">Waveform domain</text>

  <rect x="310" y="720" width="140" height="20" rx="2" fill="#C8A882" stroke="#A08060" stroke-width="1.2"/>
  <text x="380" y="734" text-anchor="middle" font-size="9" fill="#5A4030" font-weight="bold">Layers 2–4 (trainable)</text>
  <rect x="310" y="747" width="140" height="20" rx="2" fill="#EEF0F4" stroke="#7888A0" stroke-width="0.8"/>
  <text x="380" y="761" text-anchor="middle" font-size="9" fill="#666">Layers 0–1 (frozen)</text>

  <!-- Skip connections: Encoder → Decoder (arcs on the outside) -->
  <path d="M 55 720 C 25 720, 25 430, 55 430" fill="none" stroke="#B07040" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-skip)"/>
  <text x="18" y="580" text-anchor="middle" font-size="9" fill="#B07040" font-style="italic" transform="rotate(-90, 18, 580)">skip connections</text>

  <path d="M 465 720 C 495 720, 495 430, 465 430" fill="none" stroke="#B07040" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-skip)"/>
  <text x="502" y="580" text-anchor="middle" font-size="9" fill="#B07040" font-style="italic" transform="rotate(90, 502, 580)">skip connections</text>

  <!-- Arrows: Input → Encoders -->
  <path d="M 260 830 C 260 825, 200 820, 140 810" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M 260 830 C 260 825, 320 820, 380 810" fill="none" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ==================== INPUT (bottom) ==================== -->
  <rect x="195" y="850" width="130" height="45" rx="3" fill="#E8E8EC" stroke="#666" stroke-width="1.2"/>
  <text x="260" y="870" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Wet Guitar</text>
  <text x="260" y="885" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Stereo (2, T)</text>
</svg>
